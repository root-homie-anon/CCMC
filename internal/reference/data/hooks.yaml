- name: SessionStart
  category: hooks
  description: Fires once when a Claude Code session is initialized, before the first user prompt is processed.
  usage: ""
  examples:
    - "matcher: {}"
    - "matcher: { project: \"/Users/me/myproject\" }"
  related:
    - SessionEnd
    - Setup
  gotchas:
    - "Fires before any user input — environment setup scripts must be fast to avoid blocking the session."
    - "The sessionId in the payload is the canonical ID used for all subsequent events in this session."
    - "Non-zero exit from a blocking handler aborts session startup."
  detail: |
    ## When it fires
    Once per session, immediately after the CC process starts and the session ID is assigned, before the first user prompt is shown or processed.

    ## Available matchers
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID (rarely useful at start)

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command executed as a subprocess
    - `http` — HTTP POST to a URL (async or blocking per `wait` flag)

    ## Exit code behavior
    - `0` — success, session continues
    - Non-zero — aborts session startup if handler is blocking (`wait: true`); ignored if async

    ## Example config
    ```json
    {
      "hooks": {
        "SessionStart": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "command",
                "command": "echo Session started >> ~/.ccmc/session.log",
                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

- name: SessionEnd
  category: hooks
  description: Fires when a Claude Code session terminates, either by user exit or process shutdown.
  usage: ""
  examples:
    - "matcher: {}"
    - "matcher: { project: \"/Users/me/myproject\" }"
  related:
    - SessionStart
    - Stop
  gotchas:
    - "Not guaranteed to fire if the process is killed with SIGKILL — only fires on clean shutdown."
    - "Payload includes the session summary extracted from the final Stop event if available."
    - "Async handlers may not complete before the process exits — prefer synchronous cleanup."
  detail: |
    ## When it fires
    When the CC session terminates cleanly — user types `/exit`, hits Ctrl+C, or the process shuts down gracefully.

    ## Available matchers
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "timestamp": "string (ISO 8601)",
      "duration_seconds": "number"
    }
    ```

    ## Supported handler types
    - `command` — shell command executed as a subprocess
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - Exit code is ignored — session is already ending regardless
    - Use `wait: true` if cleanup must complete before the process exits

    ## Example config
    ```json
    {
      "hooks": {
        "SessionEnd": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "http",
                "url": "http://localhost:7891/hooks/session-end",
                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

- name: PreToolUse
  category: hooks
  description: Fires before any tool call is executed, allowing inspection or blocking of the tool use.
  usage: ""
  examples:
    - "matcher: { tool_name: \"Bash\" }"
    - "matcher: { tool_name: \"Write\" }"
    - "matcher: {}"
  related:
    - PostToolUse
    - PostToolUseFailure
    - PermissionRequest
  gotchas:
    - "Blocking this event (non-zero exit) prevents the tool call from executing — use carefully."
    - "The full tool input is available in the payload — inspect it to decide whether to allow."
    - "Runs synchronously; slow handlers add latency to every tool call."
  detail: |
    ## When it fires
    Immediately before Claude executes any tool call, after the permission check passes but before the tool runs.

    ## Available matchers
    - `tool_name` — match by tool name (e.g. `Bash`, `Write`, `Edit`, `Read`, `Glob`, `Grep`, `Agent`)
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "tool_name": "string",
      "tool_input": "object (tool-specific, matches tool's parameter schema)",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command; stdout can optionally modify tool input (with `modify_input: true`)
    - `http` — HTTP POST; response body can optionally modify tool input

    ## Exit code behavior
    - `0` — tool call proceeds normally
    - Non-zero — tool call is blocked; CC receives an error result for the tool use
    - Output to stdout (when `modify_input: true`) replaces the tool input JSON

    ## Example config
    ```json
    {
      "hooks": {
        "PreToolUse": [
          {
            "matcher": { "tool_name": "Bash" },
            "hooks": [
              {
                "type": "command",
                "command": "bash ~/.claude/hooks/audit-bash.sh",
                "wait": true
              }
            ]
          }
        ]
      }
    }
    ```

- name: PostToolUse
  category: hooks
  description: Fires after a tool call completes successfully, with both the input and output available.
  usage: ""
  examples:
    - "matcher: { tool_name: \"Write\" }"
    - "matcher: { tool_name: \"Edit\" }"
    - "matcher: {}"
  related:
    - PreToolUse
    - PostToolUseFailure
  gotchas:
    - "The tool output may be large for tools like Read or Bash — avoid logging the full payload in high-frequency scenarios."
    - "Runs after the tool has already executed — cannot block or modify the result."
    - "Fires for every successful tool use, including internal agent tool calls."
  detail: |
    ## When it fires
    Immediately after a tool call returns a successful result, before Claude processes the result.

    ## Available matchers
    - `tool_name` — match by tool name (e.g. `Write`, `Edit`, `Bash`, `Read`)
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "tool_name": "string",
      "tool_input": "object (tool-specific)",
      "tool_output": "object or string (tool-specific result)",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command executed after the tool completes
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - Exit code is ignored — tool has already completed successfully
    - Use for side effects: logging, registry updates, notifications

    ## Example config
    ```json
    {
      "hooks": {
        "PostToolUse": [
          {
            "matcher": { "tool_name": "Write" },
            "hooks": [
              {
                "type": "http",
                "url": "http://localhost:7891/hooks/post-tool-use",
                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

- name: PostToolUseFailure
  category: hooks
  description: Fires after a tool call fails or returns an error result, with the error details available.
  usage: ""
  examples:
    - "matcher: { tool_name: \"Bash\" }"
    - "matcher: {}"
  related:
    - PostToolUse
    - PreToolUse
  gotchas:
    - "Fires on tool errors, not permission denials — PermissionRequest fires for those."
    - "Cannot retry the tool call from this hook — informational only."
    - "The error field contains the tool's error message or exit code details."
  detail: |
    ## When it fires
    After a tool call returns an error result (e.g. Bash exits non-zero, Write fails due to permissions, Read fails file not found).

    ## Available matchers
    - `tool_name` — match by tool name
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "tool_name": "string",
      "tool_input": "object (tool-specific)",
      "error": "string",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for logging or alerting
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - Exit code is ignored — informational event only

    ## Example config
    ```json
    {
      "hooks": {
        "PostToolUseFailure": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "command",
                "command": "echo Tool failure >> ~/.ccmc/errors.log",
                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

- name: PermissionRequest
  category: hooks
  description: Fires when Claude requests permission to use a tool that requires user approval, before the approval dialog is shown.
  usage: ""
  examples:
    - "matcher: { tool_name: \"Bash\" }"
    - "matcher: {}"
  related:
    - PreToolUse
    - PostToolUse
  gotchas:
    - "A non-zero exit or explicit deny response from this hook auto-denies the permission without prompting the user."
    - "Can auto-approve permissions programmatically — use with caution in automated contexts."
    - "Only fires for tools not already covered by allow/deny rules in settings.json."
  detail: |
    ## When it fires
    When Claude attempts to use a tool that is not covered by an existing allow or deny rule, triggering the permission prompt flow.

    ## Available matchers
    - `tool_name` — match by tool name
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "tool_name": "string",
      "tool_input": "object (tool-specific)",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — stdout `{"decision": "allow"}` or `{"decision": "deny"}` controls the outcome
    - `http` — response body JSON with `decision` field

    ## Exit code behavior
    - `0` with no output — shows the normal permission dialog to the user
    - `0` with `{"decision": "allow"}` on stdout — auto-approves without prompting
    - Non-zero or `{"decision": "deny"}` — auto-denies without prompting

    ## Example config
    ```json
    {
      "hooks": {
        "PermissionRequest": [
          {
            "matcher": { "tool_name": "Bash" },
            "hooks": [
              {
                "type": "command",
                "command": "bash ~/.claude/hooks/auto-approve-bash.sh",
                "wait": true
              }
            ]
          }
        ]
      }
    }
    ```

- name: UserPromptSubmit
  category: hooks
  description: Fires each time the user submits a prompt, before Claude processes it, allowing inspection or modification of the input.
  usage: ""
  examples:
    - "matcher: {}"
    - "matcher: { project: \"/Users/me/myproject\" }"
  related:
    - PreToolUse
    - Stop
  gotchas:
    - "Can modify the prompt text by writing replacement text to stdout."
    - "Non-zero exit blocks the prompt from being processed — use for content policy enforcement."
    - "Fires on every user turn including follow-ups mid-conversation."
  detail: |
    ## When it fires
    Each time the user submits a message — whether an initial prompt, a follow-up, or a response to a Claude question.

    ## Available matchers
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "prompt": "string",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — stdout can replace the prompt text (when `modify_prompt: true`)
    - `http` — response body can replace the prompt text

    ## Exit code behavior
    - `0` — prompt proceeds normally (or with stdout replacement if applicable)
    - Non-zero — prompt is blocked; user sees an error and can retry

    ## Example config
    ```json
    {
      "hooks": {
        "UserPromptSubmit": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "command",
                "command": "bash ~/.claude/hooks/log-prompt.sh",
                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

- name: Stop
  category: hooks
  description: Fires when Claude finishes a response turn and stops generating, providing the final output and any tool use summary.
  usage: ""
  examples:
    - "matcher: {}"
    - "matcher: { project: \"/Users/me/myproject\" }"
  related:
    - StopFailure
    - SessionEnd
    - UserPromptSubmit
  gotchas:
    - "Fires after every response, not just at session end — it is high-frequency in active sessions."
    - "The stop_reason field indicates why generation stopped: end_turn, max_tokens, tool_use, etc."
    - "Task summaries and file-touched lists are most accurately built from this event."
  detail: |
    ## When it fires
    After each assistant response completes — whether the response is a short answer, a long tool-calling sequence, or a partial response that ends due to token limits.

    ## Available matchers
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID
    - `stop_reason` — match by stop reason value (`end_turn`, `max_tokens`, `tool_use`)

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "stop_reason": "string",
      "response_summary": "string",
      "tool_calls": ["array of tool_name strings used in this turn"],
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for logging or state updates
    - `http` — HTTP POST to a URL (used by CCMC daemon for session tracking)

    ## Exit code behavior
    - Exit code is ignored — informational event

    ## Example config
    ```json
    {
      "hooks": {
        "Stop": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "http",
                "url": "http://localhost:7891/hooks/stop",
                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

