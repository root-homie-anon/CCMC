- name: PreCompact
  category: hooks
  description: Fires before Claude compacts the conversation context, allowing inspection or modification of the compaction instructions.
  usage: ""
  examples:
    - "matcher: {}"
  related:
    - Stop
    - UserPromptSubmit
  gotchas:
    - "Fired by both automatic compaction (context full) and manual /compact command."
    - "Non-zero exit can block compaction — use sparingly, as blocking compaction risks context overflow."
    - "The custom_instructions field is populated when the user ran /compact with arguments."
  detail: |
    ## When it fires
    Immediately before Claude begins compacting the conversation — triggered by `/compact [instructions]` or automatically when context usage reaches the threshold.

    ## Available matchers
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID
    - `trigger` — match by trigger type: `manual` (user ran /compact) or `automatic`

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "trigger": "string (manual | automatic)",
      "custom_instructions": "string (empty if no /compact arguments)",
      "context_tokens": "number",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — stdout can inject additional compaction instructions (appended to custom_instructions)
    - `http` — response body can inject additional compaction instructions

    ## Exit code behavior
    - `0` — compaction proceeds (with any stdout instructions appended)
    - Non-zero — compaction is blocked; session continues without compacting

    ## Example config
    ```json
    {
      "hooks": {
        "PreCompact": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "command",
                "command": "cat ~/.claude/compact-instructions.txt",
                "wait": true
              }
            ]
          }
        ]
      }
    }
    ```

