                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

- name: Setup
  category: hooks
  description: Fires once during first-time CC setup or when ccmc setup is run, before the standard session lifecycle begins.
  usage: ""
  examples:
    - "matcher: {}"
  related:
    - SessionStart
    - ConfigChanged
  gotchas:
    - "Fires only during setup flows, not on every session start — do not confuse with SessionStart."
    - "Non-zero exit from a blocking setup hook can abort the setup process."
    - "Useful for running pre-flight checks before CCMC installs hooks into settings.json."
  detail: |
    ## When it fires
    During a CC setup or initialization flow — when `ccmc setup` is run or equivalent first-time configuration is triggered.

    ## Available matchers
    - `project` — match by absolute project directory path (if project-scoped setup)

    ## JSON input schema
    ```json
    {
      "project_path": "string",
      "setup_type": "string (global | project)",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for pre-flight checks or environment validation
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - `0` — setup continues
    - Non-zero — setup is aborted (if handler is blocking)

    ## Example config
    ```json
    {
      "hooks": {
        "Setup": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "command",
                "command": "bash ~/.claude/hooks/preflight-check.sh",
                "wait": true
              }
            ]
          }
        ]
      }
    }
    ```

- name: WorktreeCreated
  category: hooks
  description: Fires when a new git worktree is created for a CC session using the EnterWorktree tool or --worktree flag.
  usage: ""
  examples:
    - "matcher: {}"
    - "matcher: { project: \"/Users/me/myproject\" }"
  related:
    - SessionStart
    - CwdChanged
    - FileChanged
  gotchas:
    - "Only fires when CC itself creates the worktree — not for worktrees created externally via git."
    - "The worktree_path is the root of the newly created worktree, distinct from the original project_path."
    - "The base_branch field indicates the branch the worktree was created from."
  detail: |
    ## When it fires
    When CC creates a new git worktree — via the EnterWorktree tool or the `--worktree` CLI flag — establishing an isolated working environment for the session.

    ## Available matchers
    - `project` — match by absolute project directory path (original repo)
    - `session_id` — match by session ID

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "worktree_path": "string",
      "base_branch": "string",
      "worktree_branch": "string",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for worktree setup (e.g. installing deps in the new worktree)
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - Exit code is ignored — informational event (worktree already created)

    ## Example config
    ```json
    {
      "hooks": {
        "WorktreeCreated": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "command",
                "command": "bash ~/.claude/hooks/worktree-setup.sh",
                "wait": true
              }
            ]
          }
        ]
      }
    }
    ```
