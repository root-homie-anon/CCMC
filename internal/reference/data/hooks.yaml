    ```

- name: FileChanged
  category: hooks
  description: Fires when a file in the project is modified by a tool (Write, Edit, MultiEdit), providing the file path and change type.
  usage: ""
  examples:
    - "matcher: {}"
    - "matcher: { tool_name: \"Write\" }"
  related:
    - PostToolUse
    - CwdChanged
  gotchas:
    - "Fires per file, not per tool call — a MultiEdit touching 5 files emits 5 FileChanged events."
    - "Read-only tool calls (Read, Grep, Glob) do not trigger this event."
    - "The change_type field is: created, modified, or deleted."
  detail: |
    ## When it fires
    After any file-modifying tool (Write, Edit, MultiEdit) successfully writes to disk, once per affected file.

    ## Available matchers
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID
    - `tool_name` — match by the tool that caused the change
    - `file_path` — match by the affected file path (glob pattern supported)

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "tool_name": "string",
      "file_path": "string",
      "change_type": "string (created | modified | deleted)",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for file watchers, linters, or log entries
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - Exit code is ignored — informational event (file is already written)

    ## Example config
    ```json
    {
      "hooks": {
        "FileChanged": [
          {
            "matcher": { "file_path": "**/*.go" },
            "hooks": [
              {
                "type": "command",
                "command": "gofmt -w $FILE_PATH",
                "wait": true
              }
            ]
          }
        ]
      }
    }
    ```

- name: ConfigChanged
  category: hooks
  description: Fires when the CC configuration (settings.json or CLAUDE.md) is modified during a session.
  usage: ""
  examples:
    - "matcher: {}"
    - "matcher: { config_file: \"settings.json\" }"
  related:
    - InstructionsLoaded
    - CwdChanged
  gotchas:
    - "Fires on both global (~/.claude/settings.json) and project (.claude/settings.json) changes."
    - "Does not fire for external edits to config files — only edits made via CC commands or tools."
    - "The config_file field identifies which file changed."
  detail: |
    ## When it fires
    When CC detects a change to its configuration files — `settings.json` or `CLAUDE.md` — whether modified by a CC tool call or via a `/config` command.

    ## Available matchers
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID
    - `config_file` — match by config file name (`settings.json`, `CLAUDE.md`)
    - `scope` — match by scope (`global`, `project`)

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "config_file": "string",
      "scope": "string (global | project)",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for config validation or backup triggers
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - Exit code is ignored — informational event

    ## Example config
    ```json
    {
      "hooks": {
        "ConfigChanged": [
          {
            "matcher": { "config_file": "settings.json" },
            "hooks": [
              {
                "type": "command",
                "command": "cp ~/.claude/settings.json ~/.claude/settings.json.auto-bak",
                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

- name: InstructionsLoaded
  category: hooks
  description: Fires when CC loads or reloads CLAUDE.md instructions, providing the instruction source and content summary.
  usage: ""
  examples:
    - "matcher: {}"
    - "matcher: { scope: \"project\" }"
  related:
    - ConfigChanged
    - SessionStart
  gotchas:
    - "Fires for both global (~/.claude/CLAUDE.md) and project (.claude/CLAUDE.md or CLAUDE.md) instruction files."
    - "May fire multiple times per session if instructions are refreshed mid-session."
    - "The scope field distinguishes which level of instruction file was loaded."
  detail: |
    ## When it fires
    When CC loads CLAUDE.md instructions — at session start for all applicable scopes, and again if instructions are reloaded during the session.

    ## Available matchers
    - `project` — match by absolute project directory path
    - `session_id` — match by session ID
    - `scope` — match by scope (`global`, `project`)

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "scope": "string (global | project)",
      "file_path": "string",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for logging or instruction audit
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - Exit code is ignored — informational event

    ## Example config
    ```json
    {
      "hooks": {
        "InstructionsLoaded": [
          {
            "matcher": { "scope": "project" },
            "hooks": [
              {
                "type": "command",
                "command": "echo Project CLAUDE.md loaded >> ~/.ccmc/instructions.log",
                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

- name: TeammateIdle
  category: hooks
  description: Fires in a multi-agent team session when a teammate agent becomes idle (waiting for work or messages).
  usage: ""
  examples:
    - "matcher: {}"
    - "matcher: { agent_name: \"doug\" }"
  related:
    - SubagentStart
    - SubagentStop
    - TaskCompleted
  gotchas:
    - "Only fires in experimental agent team sessions (CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1)."
    - "Idle is distinct from stopped — a teammate goes idle between tasks but remains alive."
    - "Use this event to trigger work dispatch to idle teammates."
  detail: |
    ## When it fires
    In an agent team session, when a teammate agent completes its current task and enters an idle state, waiting to receive new work via SendMessage.

    ## Available matchers
    - `project` — match by absolute project directory path
    - `session_id` — match by team session ID
    - `agent_name` — match by teammate name (as set in TeamCreate)

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "agent_name": "string",
      "agent_id": "string",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for work dispatch logic
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - Exit code is ignored — informational event

    ## Example config
    ```json
    {
      "hooks": {
        "TeammateIdle": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "command",
                "command": "bash ~/.claude/hooks/dispatch-next-task.sh",
                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

- name: TaskCompleted
