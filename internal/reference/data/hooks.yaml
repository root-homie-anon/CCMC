- name: SubagentStart
  category: hooks
  description: Fires when a subagent (spawned via the Agent or Task tool) starts, providing the subagent's identity and task.
  usage: ""
  examples:
    - "matcher: {}"
    - "matcher: { project: \"/Users/me/myproject\" }"
  related:
    - SubagentStop
    - SessionStart
  gotchas:
    - "Subagents run in their own context but share the parent session ID for tracking."
    - "Nested subagents (subagent spawning a subagent) each emit their own SubagentStart."
    - "The agent_name may be empty for anonymous one-off agents spawned inline."
  detail: |
    ## When it fires
    When the parent Claude session spawns a subagent using the Agent or Task tool, immediately before the subagent begins executing.

    ## Available matchers
    - `project` — match by absolute project directory path
    - `session_id` — match by parent session ID
    - `agent_name` — match by agent name (from .claude/agents/ frontmatter)

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "agent_id": "string",
      "agent_name": "string",
      "task_description": "string",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for logging or registry updates
    - `http` — HTTP POST to a URL (used by CCMC daemon to track active subagents)

    ## Exit code behavior
    - Exit code is ignored — informational event

    ## Example config
    ```json
    {
      "hooks": {
        "SubagentStart": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "http",
                "url": "http://localhost:7891/hooks/subagent-start",
                "wait": false
              }
            ]
          }
        ]
      }
    }
    ```

