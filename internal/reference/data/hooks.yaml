    - "Some tools (Bash with cd) may trigger this; others may not depending on how cwd is tracked."
    - "Does not fire for cwd changes made inside a subagent — only the parent session's cwd is tracked."
  detail: |
    ## When it fires
    When the effective working directory of the CC session changes — for example, when the user changes directory or when a tool operation shifts the context to a different project root.

    ## Available matchers
    - `project` — match by absolute project directory path (new cwd)
    - `session_id` — match by session ID

    ## JSON input schema
    ```json
    {
      "session_id": "string",
      "project_path": "string",
      "previous_cwd": "string",
      "new_cwd": "string",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for logging or triggering project-switch logic
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - Exit code is ignored — informational event

    ## Example config
    ```json
    {
      "hooks": {
        "CwdChanged": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "command",
                "command": "echo CWD changed to $NEW_CWD >> ~/.ccmc/cwd.log",
                "wait": false
