      "task_id": "string",
      "task_title": "string",
      "agent_name": "string",
      "result": "string",
      "timestamp": "string (ISO 8601)"
    }
    ```

    ## Supported handler types
    - `command` — shell command for progress tracking or notifications
    - `http` — HTTP POST to a URL

    ## Exit code behavior
    - Exit code is ignored — informational event

    ## Example config
    ```json
    {
      "hooks": {
        "TaskCompleted": [
          {
            "matcher": {},
            "hooks": [
              {
                "type": "command",
